---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tinynodes.operator.tinysystems.io
spec:
  group: operator.tinysystems.io
  names:
    kind: TinyNode
    listKind: TinyNodeList
    plural: tinynodes
    singular: tinynode
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: TinyNode is the Schema for the tinynodes API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TinyNodeSpec defines the desired state of TinyNode
            properties:
              component:
                description: Component name within a module
                type: string
              edges:
                description: Edges to send message next
                items:
                  properties:
                    flowID:
                      type: string
                    id:
                      description: Edge id
                      type: string
                    port:
                      description: |-
                        Current node's port name
                        Source port
                      type: string
                    retryPolicy:
                      description: |-
                        Retry policy for this edge. Default (MaxAttempts == 0 or 1) =
                        single-shot: the scheduler dispatches once, surface the error.
                        Authors opt into retry per-edge for transient-failure-safe
                        targets (webhooks, idempotent writes). The runtime never silently
                        retries against paid LLM APIs by default — see
                        feedback_no_implicit_retries.md.
                      properties:
                        backoffCoefficient:
                          description: |-
                            Multiplier applied to the delay each attempt. Default 2.0
                            (exponential backoff).
                          type: string
                        initialDelayMs:
                          description: Initial backoff between attempts. Default 1s.
                          type: integer
                        maxAttempts:
                          default: 1
                          description: Max total dispatch attempts (1 = no retry,
                            the default).
                          maximum: 10
                          minimum: 1
                          type: integer
                        maxDelayMs:
                          description: Cap on a single attempt's delay. Default 30s.
                          type: integer
                        nonRetryableErrorCodes:
                          description: |-
                            Error codes that skip retry. Components signal these via
                            module.NonRetryable(code, err) — typically "quota_exceeded",
                            "unauthorized", "content_filter", "validation". The transport
                            stamps `x-error-code` on the reply; the scheduler reads it and
                            short-circuits the retry loop when matched.
                          items:
                            type: string
                          type: array
                        timeoutMs:
                          description: |-
                            Per-attempt handler timeout in milliseconds. Caps how long a
                            single dispatch attempt can run before the scheduler cancels
                            its context and (if MaxAttempts permits) retries the next one.
                            0 = use the transport's default (currently 5 minutes for the
                            NATS transports). Bump this on edges that legitimately need
                            long-running handlers — agent planning loops, batch LLM calls,
                            or HTTP probes against slow upstreams.
                          type: integer
                      required:
                      - maxAttempts
                      type: object
                    to:
                      description: Other node's full port name
                      type: string
                  required:
                  - flowID
                  - id
                  - port
                  - to
                  type: object
                type: array
              module:
                description: Module name - container image repo + tag
                type: string
              ports:
                description: Port configurations
                items:
                  properties:
                    configuration:
                      description: Configuration JSON data of the port's configuration
                      format: byte
                      type: string
                    flowID:
                      type: string
                    from:
                      description: Settings depend on a sender
                      type: string
                    port:
                      type: string
                    schema:
                      description: Schema JSON schema of the port
                      format: byte
                      type: string
                  required:
                  - port
                  type: object
                type: array
            required:
            - component
            - module
            type: object
          status:
            description: TinyNodeStatus defines the observed state of TinyNode
            properties:
              component:
                properties:
                  description:
                    type: string
                  info:
                    type: string
                  tags:
                    items:
                      type: string
                    type: array
                required:
                - description
                - info
                type: object
              error:
                type: boolean
              lastUpdateTime:
                format: date-time
                type: string
              metadata:
                additionalProperties:
                  type: string
                type: object
              module:
                properties:
                  name:
                    type: string
                  sdkVersion:
                    type: string
                  version:
                    type: string
                required:
                - name
                - version
                type: object
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed by the controller.
                  It corresponds to metadata.generation, which is updated on mutation by the API Server.
                format: int64
                type: integer
              ports:
                items:
                  properties:
                    configuration:
                      format: byte
                      type: string
                    label:
                      type: string
                    name:
                      type: string
                    position:
                      type: integer
                    schema:
                      format: byte
                      type: string
                    source:
                      type: boolean
                  required:
                  - configuration
                  - label
                  - name
                  - position
                  - schema
                  - source
                  type: object
                type: array
              status:
                type: string
            required:
            - component
            - module
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
