{{/*
  Broker auth token — the whole security boundary for the durable KV.

  One token per broker = per namespace = per workspace = one owner. Any
  client that reaches the NATS service must present it, so anonymous
  connects and other-workspace pods are rejected; the operator that runs
  the broker can still read (Tier-1 boundary — no cross-tenant, no
  anonymous). No per-project scoping: inside a broker it's all one owner.

  Generated ONCE and reused across upgrades via lookup, and kept on
  uninstall (resource-policy) so a reinstall never rotates the token out
  from under already-connected module pods. NATS reads it as $NATS_TOKEN
  (wired onto the nats container env in values.yaml); clients connect with
  the token in their URL (nats://<token>@tinysystems-nats.<ns>.svc:4222),
  which the install job assembles from this secret.
*/}}
{{- $name := "tinysystems-nats-auth" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name -}}
{{- $token := "" -}}
{{- if and $existing $existing.data (index $existing.data "token") -}}
{{-   $token = index $existing.data "token" | b64dec -}}
{{- else -}}
{{-   $token = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
data:
  token: {{ $token | b64enc }}
