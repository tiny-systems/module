controllerManager:
  manager:
    args:
    - run
    - --health-probe-bind-address=:8081
    - --metrics-bind-address=127.0.0.1:8080
    - --grpc-server-bind-address=:8483
    deleteArgs:
      - pre-delete
    installArgs:
      - pre-install
    extraEnv:
      - name: OTLP_DSN
        value: "http://token@tinysystems-otel-collector:2345"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    env: {}
    image:
      repository: registry.gitlab.com/tiny-systems/public-containers/controller
      tag: latest
    imagePullPolicy: Always
    podAnnotations: {}
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  replicas: 1
  serviceAccount:
    annotations: {}
imagePullSecrets: []
kubernetesClusterDomain: cluster.local
rbac:
  # Enable access to Kubernetes resources (pods, services, deployments, ingresses)
  # Required for modules that use ExposePort functionality (e.g., http-module)
  # Set to false for modules that only work with TinySystems CRDs
  enableKubernetesResourceAccess: false
  # Extra RBAC rules to add to the manager ClusterRole
  # Use this for modules that need additional Kubernetes permissions
  # Example for kubernetes-module:
  # extraRules:
  #   - apiGroups: [""]
  #     resources: ["pods", "configmaps", "secrets"]
  #     verbs: ["create", "delete", "get", "list", "watch"]
  #   - apiGroups: ["batch"]
  #     resources: ["jobs"]
  #     verbs: ["*"]
  extraRules: []
# Secret access for module components that resolve
# '{{secret:<name>/<key>}}' placeholders in node settings via the
# SDK's pkg/secret resolver. Off by default — modules that don't
# need secret reads ship with no RBAC for Secrets at all.
#
# When enabled, grants get/list/watch on secrets namespace-wide.
# Namespace isolation is the security boundary: anything in the
# same namespace is trusted by the rest of the namespace already.
# Users who want per-Secret pinning can override the Role
# manually; we don't make every install pay for that ergonomics
# cost by default.
secrets:
  enabled: false
storage:
  # Enable persistent storage for the module (creates a PVC)
  enabled: false
  # Storage size
  size: 1Gi
  # Storage class name (optional, uses cluster default if empty)
  storageClassName: ""
  # Mount path inside the container
  mountPath: /data
  # Access mode
  accessMode: ReadWriteOnce
managerIngress:
  ingress:
    annotations: {}
    className: nginx
    enabled: true
managerService:
  ports:
  - name: grpc
    port: 8483
    protocol: TCP
    targetPort: grpc
  type: ClusterIP

# Curated third-party bundles. Each block lives at the top level
# under its subchart alias (see Chart.yaml dependencies). enabled is
# false by default — the platform install UI flips it per-bundle.
# Override defaults via `--set tei.image.tag=...` etc.; that's the
# same path Helm uses for subchart values.

# TEI — text-embeddings-inference. CPU image by default; modules
# requesting GPU inference should override image.tag to a CUDA-tagged
# image (e.g. "1.5-cuda-12.2").
tei:
  enabled: false
  image:
    tag: cpu-1.5
  # Modest defaults so the bundle fits on typical single-node dev
  # clusters and small staging pools. Production embedding workloads
  # should bump these via --set tei.resources.requests.memory=...
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi

# pgvector — Postgres with the pgvector extension. Bitnami's
# postgresql chart with image swapped to pgvector/pgvector and an
# init script enabling the extension. Default credentials are
# intentionally weak — production users must override
# auth.postgresPassword.
pgvector:
  enabled: false
  image:
    registry: docker.io
    repository: pgvector/pgvector
    tag: pg16
  auth:
    database: tinysystems
    username: tinysystems
    postgresPassword: change-me
  primary:
    initdb:
      scripts:
        enable-pgvector.sql: |
          CREATE EXTENSION IF NOT EXISTS vector;
    persistence:
      size: 8Gi
