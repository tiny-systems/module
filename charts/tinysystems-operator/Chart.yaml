apiVersion: v2
name: tinysystems-operator
description: TinySystems Operator Helm chart for Kubernetes
type: application
version: 0.2.4
appVersion: "0.1.3"

# Curated bundles: third-party releases module authors can request
# via SDK module.Bundle. Each entry is a conditional subchart gated
# by `bundles.<alias>.enabled`. Install UI ticks checkboxes which
# add the matching --set flag on the module helm command — one
# release, helm-tracked lifecycle, helm uninstall cleans bundles.
#
# Adding a new bundle: register the chart here + add the default
# `bundles.<alias>:` block to values.yaml. Module authors then
# reference the bundle by its alias in SDK Bundle.Name.
dependencies:
  # Each bundle lives under its alias at the top of parent values
  # (e.g. `tei.*`, `pgvector.*`). Helm only routes parent values into
  # a subchart through the alias key — there is no way to namespace
  # them under `bundles.*` in the parent without writing custom
  # template glue. Keep the alias path as the public API for both
  # enable flags and overrides (`--set tei.enabled=true`,
  # `--set tei.image.tag=...`).
  - name: tei
    version: "0.1.1"
    repository: "file://./charts/tei"
    condition: tei.enabled
  - name: postgresql
    version: "15.5.20"
    repository: "https://charts.bitnami.com/bitnami"
    condition: pgvector.enabled
    alias: pgvector

