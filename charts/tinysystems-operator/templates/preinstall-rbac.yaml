apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tinysystems-operator.fullname" . }}-pre-install
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
# ClusterRole because namespaces is a cluster-scoped resource. The
# resourceNames pin restricts the grant to the install's own
# namespace name — the SA can read no other namespace, even though
# the verb is "get". That matches the principle of "every read is
# explicit at install time".
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tinysystems-operator.clusterScopedName" . }}-pre-install
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  resourceNames:
  - {{ .Release.Namespace }}
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tinysystems-operator.clusterScopedName" . }}-pre-install
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "tinysystems-operator.clusterScopedName" . }}-pre-install'
subjects:
- kind: ServiceAccount
  name: '{{ include "tinysystems-operator.fullname" . }}-pre-install'
  namespace: '{{ .Release.Namespace }}'
