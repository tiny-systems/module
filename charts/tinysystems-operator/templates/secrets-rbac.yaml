{{- if .Values.secrets.allowedNames }}
# Namespace-scoped Role with resourceNames pinned to the exact
# Secrets this install is allowed to read. Module code in
# pkg/secret.Resolve calls .Get against these — RBAC denies any
# other Secret name even though the SA technically requests get/
# list/watch on secrets.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tinysystems-operator.fullname" . }}-secrets-reader
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
{{- range .Values.secrets.allowedNames }}
  - {{ . | quote }}
{{- end }}
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tinysystems-operator.fullname" . }}-secrets-reader
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "tinysystems-operator.fullname" . }}-secrets-reader'
subjects:
- kind: ServiceAccount
  name: '{{ include "tinysystems-operator.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
{{- end }}
