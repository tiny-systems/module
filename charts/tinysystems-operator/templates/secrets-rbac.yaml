{{- if .Values.secrets.enabled }}
# Namespace-scoped Role granting Secret read access to the module
# pod's ServiceAccount. The SDK's pkg/secret.Resolve uses this to
# substitute secret-reference placeholders in node settings at
# OnSettings time. Namespace isolation is the security boundary —
# install modules that share secrets in the same namespace, modules
# that shouldn't see each other's secrets in separate ones.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "tinysystems-operator.fullname" . }}-secrets-reader
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "tinysystems-operator.fullname" . }}-secrets-reader
  namespace: {{ .Release.Namespace }}
  labels:
  {{- include "tinysystems-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "tinysystems-operator.fullname" . }}-secrets-reader'
subjects:
- kind: ServiceAccount
  name: '{{ include "tinysystems-operator.fullname" . }}-controller-manager'
  namespace: '{{ .Release.Namespace }}'
{{- end }}
